version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securechat_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-securechat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-securechat_pass}
      - POSTGRES_DB=${POSTGRES_DB:-securechat}
      - REDIS_HOST=redis
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - securechat_net

  db:
    image: postgres:16-alpine
    container_name: securechat_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-securechat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-securechat_pass}
      - POSTGRES_DB=${POSTGRES_DB:-securechat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securechat} -d ${POSTGRES_DB:-securechat}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - securechat_net

  redis:
    image: redis:7-alpine
    container_name: securechat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - securechat_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  securechat_net:
    driver: bridge
